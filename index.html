<style>
  :root {
    --bg: #F9F6FD;
    --card: #FFFFFF;
    --primary: #3B1F5E;
    --accent: #6B2D8B;
    --accent-light: #F3EDFB;
    --accent-mid: #B085CC;
    --success: #1A7A4A;
    --success-light: #E6F5ED;
    --warning: #C0392B;
    --warning-light: #FDECEA;
    --late: #B7770D;
    --late-light: #FEF6E4;
    --muted: #A080BC;
    --border: rgba(107,45,139,0.10);
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: 0 2px 16px rgba(107,45,139,0.07);
    --shadow-lg: 0 8px 40px rgba(107,45,139,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--primary);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* ===== ログイン画面 ===== */
  .login-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg, #2A0F45 0%, #4A1A72 50%, #6B2D8B 100%);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
  }
  .login-screen.active { display: flex; }
  .login-logo { font-size: 52px; margin-bottom: 16px; }
  .login-title { font-size: 22px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: rgba(255,255,255,0.6); text-align: center; margin-bottom: 48px; }
  .login-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    backdrop-filter: blur(10px);
  }
  .login-label { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 10px; display: block; }
  .login-input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .login-input::placeholder { color: rgba(255,255,255,0.3); letter-spacing: 0; }
  .login-input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
  .login-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: var(--radius-sm);
    background: #fff;
    color: var(--accent);
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 12px;
    transition: opacity 0.15s;
  }
  .login-btn:active { opacity: 0.8; }
  .login-skip {
    width: 100%;
    padding: 13px;
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: var(--radius-sm);
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .login-skip:active { opacity: 0.7; }
  .login-error { font-size: 13px; color: #FF8080; text-align: center; margin-top: 10px; min-height: 20px; }

  /* ===== 権限バッジ ===== */
  .role-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
  }
  .role-badge.admin { background: rgba(255,255,255,0.2); color: #fff; }
  .role-badge.guest { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }

  /* ===== ヘッダー ===== */
  .header {
    background: linear-gradient(135deg, #4A1A72 0%, #6B2D8B 55%, #7D3A9C 100%);
    padding: 20px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(107,45,139,0.22);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .app-title { font-size: 19px; font-weight: 700; color: #fff; }
  .app-subtitle { font-size: 12px; color: rgba(255,255,255,0.7); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .logout-btn {
    padding: 4px 10px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 999px;
    background: transparent;
    color: rgba(255,255,255,0.8);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
  }
  .search-box {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.07);
    border-radius: var(--radius-sm);
    padding: 9px 14px;
    gap: 8px;
    border: 1px solid rgba(167,139,250,0.25);
  }
  .search-box input {
    border: none; background: transparent;
    font-size: 14px; font-family: inherit;
    width: 100%; outline: none; color: #fff;
  }
  .search-box input::placeholder { color: rgba(255,255,255,0.6); }
  .search-icon { color: rgba(255,255,255,0.7); font-size: 16px; flex-shrink: 0; }

  /* ===== タブナビ ===== */
  .tab-nav {
    display: flex; gap: 6px;
    padding: 0 20px; margin-top: 10px;
    overflow-x: auto; scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 6px 16px; border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 13px; font-family: inherit;
    color: var(--muted); cursor: pointer;
    white-space: nowrap; transition: all 0.15s; font-weight: 500;
  }
  .tab-btn.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent-mid); }

  /* ===== フィルターチップ ===== */
  .filter-chips {
    display: flex; gap: 6px;
    padding: 12px 20px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip {
    padding: 5px 14px; border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 12px; font-family: inherit;
    color: var(--muted); cursor: pointer;
    white-space: nowrap; transition: all 0.15s; font-weight: 500;
  }
  .chip.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  /* ===== コンテンツ ===== */
  .content { padding: 12px 16px 0; }

  /* ===== サマリーカード ===== */
  .summary-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .sum-card { background: var(--card); border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; box-shadow: var(--shadow); border: 1.5px solid var(--border); }
  .sum-num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .sum-label { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .sum-card.warn .sum-num { color: var(--warning); }
  .sum-card.ok .sum-num { color: var(--success); }

  /* ===== 備品カード ===== */
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
  .item-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .item-card {
    background: var(--card); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: transform 0.12s, box-shadow 0.12s;
    border: 1.5px solid var(--border);
  }
  .item-card:active { transform: scale(0.97); box-shadow: var(--shadow-lg); }
  .item-thumb {
    width: 46px; height: 46px; border-radius: 14px;
    object-fit: contain;
    flex-shrink: 0;
    background: var(--accent-light);
  }
  .item-thumb-placeholder {
    width: 46px; height: 46px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .item-thumb-placeholder.dress { background: linear-gradient(135deg,#3D1F3A,#52294D); }
  .item-thumb-placeholder.suit  { background: linear-gradient(135deg,#2A1F4A,#3B2A66); }
  .item-thumb-placeholder.shoes { background: linear-gradient(135deg,#FFF0D6,#FFE0A8); }
  .item-thumb-placeholder.other { background: linear-gradient(135deg,#0F2E1F,#153D28); }
  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--primary); }
  .item-no { display: inline-block; font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-light); border-radius: 6px; padding: 2px 8px; margin-top: 4px; border: 1px solid rgba(167,139,250,0.2); }
  .item-note { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .item-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .badge { padding: 4px 11px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .badge.ok   { background: var(--success-light); color: var(--success); }
  .badge.out  { background: var(--accent-light); color: var(--accent); }
  .badge.late { background: var(--late-light); color: var(--late); }
  .borrower-text { font-size: 11px; color: var(--muted); }

  /* ===== 詳細ドロワー ===== */
  .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .drawer-backdrop.open { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed; bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%; max-width: 480px;
    background: var(--card); border-radius: 24px 24px 0 0;
    padding: 0 0 40px; z-index: 201;
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto;
  }
  .drawer.open { transform: translateX(-50%) translateY(0); }
  .drawer-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .drawer-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  .drawer-id { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .drawer-name { font-size: 20px; font-weight: 700; color: var(--primary); }
  .drawer-img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 0; display: block; background: var(--accent-light); }
  .drawer-body { padding: 16px 20px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--muted); font-size: 13px; }
  .info-val { font-weight: 500; }
  .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
  .btn { padding: 14px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-family: inherit; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .btn:active { opacity: 0.75; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: #F3EDFB; color: var(--primary); border: 1.5px solid var(--border); }
  .btn-danger { background: var(--warning-light); color: var(--warning); }
  .btn-full { grid-column: 1 / -1; }
  .form-section { margin-top: 16px; }
  .form-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; background: #FDFBFF; }
  .form-input:focus { border-color: var(--accent); background: #fff; }

  /* ===== 写真アップロード ===== */
  .photo-upload-area {
    border: 2px dashed var(--accent-mid);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    background: var(--accent-light);
    margin-top: 10px;
    transition: background 0.15s;
  }
  .photo-upload-area:hover { background: #EBE0F8; }
  .photo-upload-area input { display: none; }
  .photo-preview { width: 100%; border-radius: var(--radius-sm); margin-top: 10px; display: none; max-height: 180px; object-fit: cover; }

  /* ===== ボトムナビ ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--card); border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 20px; z-index: 100;
  }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: transparent; cursor: pointer; padding: 6px; font-family: inherit; color: var(--muted); font-size: 10px; transition: color 0.15s; }
  .nav-btn.active { color: var(--accent); font-weight: 700; }
  .nav-icon { font-size: 22px; }

  /* ===== スクリーン ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== 延滞バナー ===== */
  .alert-banner { background: var(--warning-light); border-left: 3px solid var(--warning); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--warning); font-weight: 500; }

  /* ===== トースト ===== */

    display: none;

  /* ===== 履歴画面 ===== */

    background: var(--card);

  /* ===== 掲示板 ===== */

  .post-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border: 1.5px solid var(--border); margin-bottom: 10px; cursor: pointer; transition: transform 0.12s; }

<script>
// ======== 設定 ========
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxrvcq0meR18RsQE9mvsuU6r6LUrhsTh3Dn5gZhQqlx1dnHJTx63-qUqVeFOKWiUrfY3Q/exec';
const DRIVE_FOLDER_ID = '1mY0Ap_irUIyIIxuIw1413Odfa8ljId8e';
const ADMIN_PASSWORD = 'Bihin';

// ======== 状態 ========
let items = [];
let boardPosts = [];
let currentTab = 'all';
let currentGenre = 'all';
let currentSearch = '';
let selectedItem = null;
let isAdmin = false;

// ======== ログイン ========
let currentUserName = '';

function cleanName(str) {
  // 前後スペース・全角スペース・全角英数を半角に正規化
  return str.replace(/[\u3000\u0020]+/g, ' ').trim();
}

function doLogin() {
  const rawName = document.getElementById('nameInput').value;
  const name = cleanName(rawName);
  const pw = document.getElementById('loginInput').value;

  if (!name) {
    document.getElementById('loginError').textContent = 'お名前を入力してください';
    return;
  }

  if (pw && pw !== ADMIN_PASSWORD) {
    document.getElementById('loginError').textContent = 'パスワードが違います';
    document.getElementById('loginInput').value = '';
    return;
  }

  currentUserName = name;
  isAdmin = pw === ADMIN_PASSWORD;

  // 名前をLocalStorageに保存
  localStorage.setItem('userName', name);

  startApp();
}

function doLogout() {
  isAdmin = false;
  currentUserName = '';
  document.getElementById('loginInput').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('mainHeader').style.display = 'none';
  document.getElementById('tabNav').style.display = 'none';
  document.getElementById('filterChips').style.display = 'none';
  document.getElementById('bottomNav').style.display = 'none';
}

// ページ読み込み時に保存済み名前を復元
window.addEventListener('DOMContentLoaded', () => {
  const savedName = localStorage.getItem('userName');
  if (savedName) {
    document.getElementById('nameInput').value = savedName;
  }
});
function startApp() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('mainHeader').style.display = 'block';
  document.getElementById('tabNav').style.display = 'flex';
  document.getElementById('filterChips').style.display = 'flex';
  document.getElementById('bottomNav').style.display = 'flex';

  // 権限バッジ（名前を表示）
  const badge = document.getElementById('roleBadge');
  badge.className = 'role-badge ' + (isAdmin ? 'admin' : 'guest');
  badge.textContent = isAdmin ? `👑 ${currentUserName}` : `👤 ${currentUserName}`;

  // 管理者専用UI
  document.querySelectorAll('.admin-only').forEach(el => {
    el.style.display = isAdmin ? 'flex' : 'none';
  });
  document.getElementById('boardPostBtn').style.display = isAdmin ? 'block' : 'none';

  switchScreen('list');
  fetchSheetsData();
  fetchBoardData();
}

// ======== ログイン画面でEnterキー対応 ========
document.getElementById('loginInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ======== データ取得 ========
async function fetchSheetsData() {
  document.getElementById('itemList').innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:14px;">📡 データを読み込み中...</div>';
  try {
    const res = await fetch(GAS_URL);
    const json = await res.json();
    items = (json.items || []).map((row, idx) => ({
      id:       row['ユニーク識別子'] || (row['備品名'] + '-' + idx),
      uid:      row['ユニーク識別子'] || '',
      rowIndex: idx + 2,
      no:       row['番号'] || '',
      name:     row['備品名'] || '',
      sub:      row['サブカテゴリ'] || '',
      genre:    row['ジャンル'] || '',
      status:   row['ステータス'] || '貸出可能',
      borrower: row['借受者'] || '',
      lendDate: row['最終貸出日'] || '',
      dueDate:  row['最終返却予定日'] || '',
      note:     row['備考'] || '',
      photoUrl: row['写真URL'] || '',
    })).filter(i => i.name);
    render();
    updateAdminStats();
  } catch(e) {
    document.getElementById('itemList').innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--warning);font-size:14px;">⚠️ データの読み込みに失敗しました。</div>';
  }
}

// ======== 日付ユーティリティ ========
const today = new Date();
function parseDate(str) {
  if (!str) return null;
  // "2025/9/9" "2025-09-09" "Wed Sep 09 2025..." など各形式に対応
  const d = new Date(str.replace(/\//g, '-'));
  return isNaN(d) ? null : d;
}
function isLate(item) {
  if (item.status !== '貸出中' || !item.dueDate) return false;
  const d = parseDate(item.dueDate);
  return d && d < today;
}
function formatDateJP(str) {
  if (!str) return '未設定';
  const d = parseDate(str);
  if (!d) return str;
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
function iconFor(genre) {
  if (genre === 'ドレス') return { emoji: '👗', cls: 'dress' };
  if (genre === '燕尾')  return { emoji: '🤵', cls: 'suit' };
  if (genre === 'シューズ') return { emoji: '👟', cls: 'shoes' };
  return { emoji: '📦', cls: 'other' };
}

// ======== フィルタリング ========
function getFilteredItems() {
  return items.filter(item => {
    const matchTab =
      currentTab === 'all' ||
      (currentTab === 'available' && item.status === '貸出可能') ||
      (currentTab === 'lent' && item.status === '貸出中') ||
      (currentTab === 'late' && isLate(item));
    const matchGenre = currentGenre === 'all' || item.genre === currentGenre;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q ||
      item.name.toLowerCase().includes(q) ||
      item.id.toLowerCase().includes(q) ||
      item.borrower.toLowerCase().includes(q);
    return matchTab && matchGenre && matchSearch;
  });
}

      ? '<span class="badge ok">貸出可能</span>'

// ======== 画像読み込み（GAS経由・キャッシュ付き） ========
const imageCache = {};
async function loadImage(fileId, imgElement) {
  if (!fileId) return;
  // キャッシュがあれば即表示
  if (imageCache[fileId]) {
    imgElement.src = imageCache[fileId];
    imgElement.style.display = 'block';
    return;
  }
  // HTTPSのURLの場合はそのまま表示を試みる
  if (fileId.startsWith('http')) {
    imgElement.src = fileId;
    return;
  }
  try {
    const res = await fetch(GAS_URL + '?fileId=' + fileId);
    const json = await res.json();
    if (json.success) {
      const dataUrl = `data:${json.mimeType};base64,${json.data}`;
      imageCache[fileId] = dataUrl; // キャッシュに保存
      imgElement.src = dataUrl;
      imgElement.style.display = 'block';
    }
  } catch(e) {
    imgElement.style.display = 'none';
  }
}
function previewDrawerPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const preview = document.getElementById('drawerPhotoPreview');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
}
function previewRegPhoto(e) {

// ======== 写真アップロード ========
async function uploadPhoto() {
  if (!selectedItem) return;
  const input = document.getElementById('drawerPhotoInput');
  if (!input.files[0]) { showToast('写真を選択してください'); return; }
  showToast('⏳ アップロード中...');
  try {
    const base64 = await toBase64(input.files[0]);
    const res = await fetch(GAS_URL, {
      method: 'POST',
      redirect: 'follow',
      body: JSON.stringify({
        action: 'uploadPhoto',
        id: selectedItem.uid || selectedItem.id,
        fileName: selectedItem.id + '_' + Date.now() + '.jpg',
        fileData: base64,
        mimeType: input.files[0].type,
        folderId: DRIVE_FOLDER_ID
      })
    });
    const json = await res.json();
    if (json.success && json.url) {
      selectedItem.photoUrl = json.url;
      showToast('✅ 写真をアップロードしました');
      closeDrawer();
      render();
    } else {
      showToast('⚠️ アップロード失敗: ' + (json.error || '不明'));
    }
  } catch(e) {
    showToast('⚠️ 通信エラーが発生しました');
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > h && w > MAX) { h = h * MAX / w; w = MAX; }
        else if (h > MAX) { w = w * MAX / h; h = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ======== 貸出・返却 ========
async function doLend() {
  if (!selectedItem) return;
  const borrower = document.getElementById('borrowerInput').value.trim();
  const dueDate = document.getElementById('dueDateInput').value;
  if (!borrower) { showToast('借受者名を入力してください'); return; }
  if (!dueDate) { showToast('返却予定日を入力してください'); return; }
  const d = dueDate.replace(/-/g,'/');
  const lendDateStr = new Date().toLocaleDateString('ja-JP').replace(/\//g,'/');
  // closeDrawer前にデータを保存
  const itemId = selectedItem.uid || selectedItem.id;
  const rowIndex = selectedItem.rowIndex;
  const itemName = selectedItem.name;
  // ローカル状態を更新
  selectedItem.status = '貸出中';
  selectedItem.borrower = borrower;
  selectedItem.dueDate = d;
  closeDrawer();
  render();
  showToast('⏳ 処理中...');
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      redirect: 'follow',
      body: JSON.stringify({ action:'lend', id: itemId, rowIndex, borrower, lendDate: lendDateStr, dueDate: d })
    });
  } catch(e) { /* CORSエラーは無視、GASは正常に処理済み */ }
  showToast(`✅ ${itemName} を ${borrower} に貸し出しました`);
}

async function doReturn() {
  if (!selectedItem) return;
  const name = selectedItem.name;
  const borrower = selectedItem.borrower;
  // closeDrawer前にデータを保存
  const itemId = selectedItem.uid || selectedItem.id;
  const rowIndex = selectedItem.rowIndex;
  // ローカル状態を更新
  selectedItem.status = '貸出可能';
  selectedItem.borrower = '';
  selectedItem.dueDate = '';
  closeDrawer();
  render();
  showToast('⏳ 処理中...');
  try {

      body: JSON.stringify({ action:'return', id: itemId, rowIndex, borrower })
    });
  } catch(e) { /* CORSエラーは無視、GASは正常に処理済み */ }
  showToast(`✅ ${name}（${borrower}）の返却を記録しました`);
}

  document.getElementById('tabNav').style.display = isListScreen ? 'flex' : 'none';
  document.getElementById('filterChips').style.display = isListScreen ? 'flex' : 'none';

  // 掲示板を開いたら通知バッジを消す
  if (screen === 'board') {
    clearBoardBadge();
  }
  // 履歴を開いたらデータ取得
  if (screen === 'history') {
    fetchHistoryData();
  }
  // マイ貸出を開いたら自動検索
  if (screen === 'my') {
    document.getElementById('myNameInput').value = currentUserName;
    if (currentUserName) searchMyItems();
  }
}

// ======== 貸出・返却履歴 ========
async function fetchHistoryData() {
  document.getElementById('historyList').innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:14px;">📡 読み込み中...</div>';
  try {
    const res = await fetch(GAS_URL + '?sheet=貸出履歴');
    const json = await res.json();
    const history = (json.items || []).reverse();
    if (history.length === 0) {
      document.getElementById('historyList').innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:14px;">履歴がありません</div>';
      return;
    }
    document.getElementById('historyList').innerHTML = history.slice(0, 100).map(row => {
      const isReturn = row['返却処理'] === '返却';
      const date = row['タイムスタンプ'] ? new Date(row['タイムスタンプ']).toLocaleDateString('ja-JP') : '';
      const id = row['ユニーク識別子'] || '';
      const itemName = row['備品名'] || '';
      const borrower = row['借受者名'] || '';
      const lendDate = row['貸出日'] ? formatDateJP(row['貸出日']) : '';
      const returnDate = row['返却日'] ? formatDateJP(row['返却日']) : '';
      return `<div class="history-card">
        <div class="history-type ${isReturn ? 'return' : 'lend'}">${isReturn ? '📥' : '📤'}</div>
        <div class="history-info">
          <div class="history-name">${itemName || id}</div>
          <div class="history-meta">${borrower}　${id}　${isReturn ? '返却 ' + returnDate : '貸出 ' + lendDate}</div>
        </div>
        <div class="history-date">${date}</div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('historyList').innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--warning);font-size:14px;">⚠️ 履歴の読み込みに失敗しました</div>';
  }
}

// ======== 掲示板通知バッジ ========
function checkBoardBadge() {
  const lastChecked = localStorage.getItem('boardLastChecked') || '0';
  if (boardPosts.length === 0) return;
  const latest = boardPosts[0]['投稿日時'];
  if (latest && new Date(latest).getTime() > parseInt(lastChecked)) {
    document.getElementById('boardBadge').classList.add('show');
  }
}
function clearBoardBadge() {
  localStorage.setItem('boardLastChecked', Date.now().toString());
  document.getElementById('boardBadge').classList.remove('show');
}

// ======== 管理画面統計 ========
function updateAdminStats() {
  if (!isAdmin) return;
  const total = items.length;
  const available = items.filter(i => i.status === '貸出可能').length;
  const lent = items.filter(i => i.status === '貸出中').length;
  const late = items.filter(i => isLate(i)).length;
  const statsEl = document.getElementById('adminStats');
  if (statsEl) {
    statsEl.innerHTML = `
      総備品数：${total}件<br>
      貸出可能：${available}件<br>
      貸出中：${lent}件<br>
      延滞中：${late}件
    `;
  }
}

// ======== トースト ========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
